<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Chromebook Checkout</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div class="page-shell">
		<header class="hero-panel">
			<div>
				<p class="eyebrow"></p>
				<h1>Chromebook Checkout</h1>
			</div>
			<div class="login-section">
				<button class="secondary-btn" id="loginButton">Login</button>
				<span class="login-label" id="loginStatus">Not signed in</span>
			</div>
		</header>

		<section class="action-grid">
			<button class="action-card checkin-card" id="checkinButton">Checkin</button>
			<button class="action-card checkout-card" id="checkoutButton">Checkout</button>
		</section>

		<section class="hero-card stats-area">
			<div class="stats-grid">
				<div class="stat-card available">
					<div class="stat-number" id="availableCount">32</div>
					<div class="stat-label">Available</div>
				</div>
				<div class="stat-card checkedout">
					<div class="stat-number" id="checkedOutCount">0</div>
					<div class="stat-label">Checked Out</div>
				</div>
			</div>
		</section>

		<section class="grid-panel">
			<h2>Devices</h2>
			<div id="deviceGrid" class="device-grid" aria-label="Device grid"></div>
		</section>

		<section class="log-panel">
			<h2>Activity Log</h2>
			<ul id="activityLog" class="activity-log">
				<li class="log-empty">No actions yet. Use checkout or checkin to start logging.</li>
			</ul>
		</section>
	</div>

	<div class="modal" id="checkoutModal" aria-hidden="true">
		<div class="modal-content">
			<button class="modal-close" id="closeCheckout">×</button>
			<h3>Checkout Chromebook</h3>
			<form id="checkoutForm">
				<label for="checkoutDevice">Serial Number</label>
				<input type="text" id="checkoutDevice" name="device" required placeholder="SN1001" />
				<label for="checkoutStudent">Student ID</label>
				<input type="text" id="checkoutStudent" name="student" required placeholder="xxx" />
				<button type="submit" class="primary-btn">Confirm Checkout</button>
			</form>
		</div>
	</div>

	<div class="modal" id="checkinModal" aria-hidden="true">
		<div class="modal-content">
			<button class="modal-close" id="closeCheckin">×</button>
			<h3>Checkin Chromebook</h3>
			<form id="checkinForm">
				<label for="checkinStudent">Student ID</label>
				<input type="text" id="checkinStudent" name="student" required placeholder="e.g. S12345" />
				<button type="submit" class="primary-btn">Confirm Checkin</button>
			</form>
		</div>
	</div>

	<div class="modal" id="deviceModal" aria-hidden="true">
		<div class="modal-content">
			<button class="modal-close" id="closeDevice">×</button>
			<h3 id="deviceModalTitle">Device</h3>
			<div id="deviceModalBody"></div>
		</div>
	</div>

	<div class="modal" id="loginModal" aria-hidden="true">
		<div class="modal-content">
			<button class="modal-close" id="closeLogin">×</button>
			<h3>Sign In</h3>
			<form id="loginForm">
				<label for="loginUsername">Username</label>
				<input type="text" id="loginUsername" required placeholder="username" />
				<label for="loginPassword">Password</label>
				<input type="password" id="loginPassword" required placeholder="password" />
				<button type="submit" class="primary-btn">Sign In</button>
			</form>
		</div>
	</div>

	<script>
		const checkoutButton = document.getElementById('checkoutButton');
		const checkinButton = document.getElementById('checkinButton');
		const checkoutModal = document.getElementById('checkoutModal');
		const checkinModal = document.getElementById('checkinModal');
		const closeCheckout = document.getElementById('closeCheckout');
		const closeCheckin = document.getElementById('closeCheckin');
		const checkoutForm = document.getElementById('checkoutForm');
		const checkinForm = document.getElementById('checkinForm');
		const activityLog = document.getElementById('activityLog');
		const loginButton = document.getElementById('loginButton');
		const loginModal = document.getElementById('loginModal');
		const closeLogin = document.getElementById('closeLogin');
		const loginForm = document.getElementById('loginForm');
		const loginUsername = document.getElementById('loginUsername');
		const loginPassword = document.getElementById('loginPassword');
		const loginStatus = document.getElementById('loginStatus');
		const TOTAL_DEVICES = 32;
		const STORAGE_KEY = 'cbcheckouts_v1';
		const LOGIN_USER_KEY = 'cbcheckouts_currentUser';
		const VALID_USER = 'username';
		const VALID_PASS = 'password';
		let currentUser = null;
		const DEFAULT_DEVICE_META = {};
		for (let i = 1; i <= TOTAL_DEVICES; i++) {
			const padded = String(i).padStart(2, '0');
			DEFAULT_DEVICE_META[String(i)] = {
				barcode: `CB${padded}BAR`,
				serial: `SN${1000 + i}`
			};
		}
		const state = {
			devices: {},
			activity: [],
			deviceMeta: {}
		};

		function ensureDevices() {
			for (let i = 1; i <= TOTAL_DEVICES; i++) {
				const key = String(i);
				if (!Object.prototype.hasOwnProperty.call(state.devices, key)) {
					state.devices[key] = null;
				}
			}
		}

		function ensureMeta() {
			for (let i = 1; i <= TOTAL_DEVICES; i++) {
				const key = String(i);
				if (!Object.prototype.hasOwnProperty.call(state.deviceMeta, key)) {
					state.deviceMeta[key] = { ...DEFAULT_DEVICE_META[key] };
				}
			}
		}

		function getDeviceMeta(deviceNum) {
			return state.deviceMeta[deviceNum] || DEFAULT_DEVICE_META[deviceNum] || { barcode: '', serial: '' };
		}

		function getStorageKey() {
			return currentUser ? `${STORAGE_KEY}_${currentUser}` : STORAGE_KEY;
		}

		function saveState() {
			if (!currentUser) return;
			try {
				const payload = { devices: state.devices, activity: state.activity, deviceMeta: state.deviceMeta };
				localStorage.setItem(getStorageKey(), JSON.stringify(payload));
			} catch (e) {
				console.warn('Failed to save state', e);
			}
		}

		function saveLoggedInUser() {
			if (currentUser) {
				localStorage.setItem(LOGIN_USER_KEY, currentUser);
			}
		}

		function clearLoggedInUser() {
			localStorage.removeItem(LOGIN_USER_KEY);
		}

		function loadLoggedInUser() {
			const user = localStorage.getItem(LOGIN_USER_KEY);
			if (user === VALID_USER) {
				currentUser = user;
			}
		}

		function loadState() {
			let hasSavedState = false;
			if (!currentUser) {
				state.devices = {};
				state.activity = [];
				state.deviceMeta = {};
				ensureDevices();
				ensureMeta();
				return;
			}
			try {
				const raw = localStorage.getItem(getStorageKey());
				if (raw) {
					hasSavedState = true;
					const parsed = JSON.parse(raw);
					if (parsed && typeof parsed === 'object') {
						if (parsed.devices && typeof parsed.devices === 'object') {
							state.devices = parsed.devices;
						} else if (parsed.checkouts && typeof parsed.checkouts === 'object') {
							// legacy format: map student->deviceString, attempt to convert
							for (const [student, deviceStr] of Object.entries(parsed.checkouts)) {
								const numMatch = String(deviceStr).match(/(\d+)/);
								if (numMatch) {
									state.devices[String(parseInt(numMatch[1], 10))] = student;
								}
							}
						}
						if (parsed.deviceMeta && typeof parsed.deviceMeta === 'object') {
							state.deviceMeta = parsed.deviceMeta;
						}
						if (Array.isArray(parsed.activity)) {
							state.activity = parsed.activity;
						}
					}
				}
			} catch (e) {
				console.warn('Failed to load state', e);
			}
			ensureDevices();
			ensureMeta();
			if (!hasSavedState) {
				saveState();
			}
		}

		function updateCounts() {
			const checked = Object.values(state.devices).filter(Boolean).length;
			const available = Math.max(0, TOTAL_DEVICES - checked);
			document.getElementById('checkedOutCount').textContent = checked;
			document.getElementById('availableCount').textContent = available;
		}

		const deviceGrid = document.getElementById('deviceGrid');
		const deviceModal = document.getElementById('deviceModal');
		const closeDevice = document.getElementById('closeDevice');
		const deviceModalTitle = document.getElementById('deviceModalTitle');
		const deviceModalBody = document.getElementById('deviceModalBody');

		function renderGrid() {
			deviceGrid.innerHTML = '';
			for (let i = 1; i <= TOTAL_DEVICES; i++) {
				const key = String(i);
				const btn = document.createElement('button');
				btn.className = 'device-btn ' + (state.devices[key] ? 'checkedout' : 'available');
				btn.textContent = key;
				btn.dataset.device = key;
				btn.addEventListener('click', () => openDeviceModal(key));
				deviceGrid.appendChild(btn);
			}
		}

		function setControlsEnabled(enabled) {
			checkoutButton.disabled = !enabled;
			checkinButton.disabled = !enabled;
			const gridButtons = document.querySelectorAll('.device-btn');
			gridButtons.forEach(btn => btn.disabled = !enabled);
		}

		function renderLoginStatus() {
			loginStatus.textContent = currentUser ? `Signed in as ${currentUser}` : 'Not signed in';
			loginButton.textContent = currentUser ? 'Logout' : 'Login';
		}

		function openDeviceModal(deviceNum) {
			deviceModalTitle.textContent = `Device ${deviceNum}`;
			const student = state.devices[String(deviceNum)];
			const meta = getDeviceMeta(String(deviceNum));
			deviceModalBody.innerHTML = '';
			const info = document.createElement('div');
			info.className = 'device-info';
			info.innerHTML = `
				<div class="editable-meta-row" id="barcodeRow">
					<span><strong>Barcode:</strong> <span id="barcodeValue">${meta.barcode}</span></span>
					<button type="button" class="secondary-btn small-btn" id="editBarcode">Edit</button>
				</div>
				<div class="editable-meta-row" id="serialRow">
					<span><strong>Serial:</strong> <span id="serialValue">${meta.serial}</span></span>
					<button type="button" class="secondary-btn small-btn" id="editSerial">Edit</button>
				</div>
				<p><strong>Status:</strong> ${student ? 'Checked out' : 'Available'}</p>
			`;
			deviceModalBody.appendChild(info);

			const openMetaEditor = (field, label, currentValue) => {
				const row = info.querySelector(`#${field}Row`);
				row.innerHTML = `
					<div class="meta-edit-group">
						<label for="edit${field}Input">${label}</label>
						<input id="edit${field}Input" class="meta-input" value="${currentValue}" />
						<div class="meta-edit-actions">
							<button type="button" class="secondary-btn small-btn" id="save${field}">Save</button>
							<button type="button" class="secondary-btn small-btn" id="cancel${field}">Cancel</button>
						</div>
					</div>
				`;

				row.querySelector(`#save${field}`).addEventListener('click', () => {
					const input = row.querySelector(`#edit${field}Input`);
					const newValue = input.value.trim();
					if (!newValue) {
						alert(`${label} cannot be empty.`);
						return;
					}
					state.deviceMeta[String(deviceNum)][field] = newValue;
					addLog(`Updated ${label.toLowerCase()} for Chromebook ${deviceNum} to ${newValue}`);
					saveState();
					openDeviceModal(deviceNum);
				});

				row.querySelector(`#cancel${field}`).addEventListener('click', () => {
					openDeviceModal(deviceNum);
				});
			};

			info.querySelector('#editBarcode').addEventListener('click', () => openMetaEditor('barcode', 'Barcode', meta.barcode));
			info.querySelector('#editSerial').addEventListener('click', () => openMetaEditor('serial', 'Serial', meta.serial));

			if (student) {
				const p = document.createElement('p');
				p.textContent = `Checked out to: ${student}`;
				const btn = document.createElement('button');
				btn.className = 'primary-btn';
				btn.textContent = 'Checkin';
				btn.addEventListener('click', () => {
					state.devices[String(deviceNum)] = null;
					addLog(`Checked in Chromebook ${deviceNum} from student ${student}`);
					saveState();
					updateCounts();
					renderGrid();
					renderActivity();
					closeModal(deviceModal);
				});
				deviceModalBody.appendChild(p);
				deviceModalBody.appendChild(btn);
			} else {
				const form = document.createElement('form');
				form.innerHTML = `
					<label for="deviceStudent">Student ID</label>
					<input id="deviceStudent" name="student" required placeholder="e.g. S12345" />
				`;
				const submit = document.createElement('button');
				submit.className = 'primary-btn';
				submit.textContent = 'Checkout';
				submit.type = 'button';
				submit.addEventListener('click', () => {
					const input = form.querySelector('#deviceStudent');
					const studentId = input.value.trim();
					if (!studentId) return;
					state.devices[String(deviceNum)] = studentId;
					addLog(`Checked out Chromebook ${deviceNum} to student ${studentId}`);
					saveState();
					updateCounts();
					renderGrid();
					renderActivity();
					closeModal(deviceModal);
				});
				deviceModalBody.appendChild(form);
				deviceModalBody.appendChild(submit);
			}
			openModal(deviceModal);
		}

		function openModal(modal) {
			modal.classList.add('open');
			modal.setAttribute('aria-hidden', 'false');
		}

		function closeModal(modal) {
			modal.classList.remove('open');
			modal.setAttribute('aria-hidden', 'true');
		}

		function addLog(message) {
			const text = `${new Date().toLocaleTimeString()} — ${message}`;
			// store newest first
			state.activity.unshift(text);
			saveState();
			const emptyNode = document.querySelector('.log-empty');
			if (emptyNode) emptyNode.remove();
			const item = document.createElement('li');
			item.textContent = text;
			activityLog.prepend(item);
		}

		function renderActivity() {
			activityLog.innerHTML = '';
			if (!state.activity || state.activity.length === 0) {
				const empty = document.createElement('li');
				empty.className = 'log-empty';
				empty.textContent = 'No actions yet. Use checkout or checkin to start logging.';
				activityLog.appendChild(empty);
				return;
			}
			for (const entry of state.activity) {
				const item = document.createElement('li');
				item.textContent = entry;
				activityLog.appendChild(item);
			}
		}

		checkoutButton.addEventListener('click', () => openModal(checkoutModal));
		checkinButton.addEventListener('click', () => openModal(checkinModal));
		closeCheckout.addEventListener('click', () => closeModal(checkoutModal));
		closeCheckin.addEventListener('click', () => closeModal(checkinModal));
		closeDevice.addEventListener('click', () => closeModal(deviceModal));
		loginButton.addEventListener('click', () => {
			if (currentUser) {
				currentUser = null;
				clearLoggedInUser();
				loadState();
				renderGrid();
				updateCounts();
				renderActivity();
				renderLoginStatus();
				setControlsEnabled(false);
			} else {
				openModal(loginModal);
			}
		});
		closeLogin.addEventListener('click', () => closeModal(loginModal));
		loginForm.addEventListener('submit', event => {
			event.preventDefault();
			const username = loginUsername.value.trim();
			const password = loginPassword.value.trim();
			if (username === VALID_USER && password === VALID_PASS) {
				currentUser = username;
				saveLoggedInUser();
				loadState();
				renderGrid();
				updateCounts();
				renderActivity();
				renderLoginStatus();
				setControlsEnabled(true);
				closeModal(loginModal);
				loginForm.reset();
			} else {
				alert('Invalid username or password.');
			}
		});

		checkoutForm.addEventListener('submit', event => {
			event.preventDefault();
			const serial = document.getElementById('checkoutDevice').value.trim();
			const student = document.getElementById('checkoutStudent').value.trim();
			if (!serial || !student) return;
			const deviceNum = Object.entries(deviceMeta).find(([, meta]) => meta.serial === serial)?.[0];
			if (!deviceNum) {
				alert('No Chromebook found for that serial number.');
				return;
			}
			if (state.devices[deviceNum]) {
				alert(`Device ${deviceNum} is already checked out.`);
				return;
			}
			state.devices[deviceNum] = student;
			addLog(`Checked out Chromebook ${deviceNum} (serial ${serial}) to student ${student}`);
			saveState();
			checkoutForm.reset();
			closeModal(checkoutModal);
			updateCounts();
			renderGrid();
			renderActivity();
		});

		checkinForm.addEventListener('submit', event => {
			event.preventDefault();
			const student = document.getElementById('checkinStudent').value.trim();
			if (!student) return;
			let found = null;
			for (const [num, sid] of Object.entries(state.devices)) {
				if (sid === student) {
					found = num;
					break;
				}
			}
			if (found) {
				state.devices[found] = null;
				addLog(`Checked in Chromebook ${found} from student ${student}`);
			} else {
				addLog(`No Chromebook found for student ${student}`);
			}
			saveState();
			checkinForm.reset();
			closeModal(checkinModal);
			updateCounts();
			renderGrid();
			renderActivity();
		});

		// load logged-in account and its persisted state on load
		loadLoggedInUser();
		loadState();
		renderGrid();
		updateCounts();
		renderActivity();
		renderLoginStatus();
		setControlsEnabled(!!currentUser);
	</script>
</body>
</html>
