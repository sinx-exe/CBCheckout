<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Chromebook Checkout</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div class="page-shell">
		<header class="hero-panel">
			<div>
				<p class="eyebrow">School Device Manager</p>
				<h1>Chromebook Checkout</h1>
			</div>
		</header>

		<section class="action-grid">
			<button class="action-card checkin-card" id="checkinButton">Checkin</button>
			<button class="action-card checkout-card" id="checkoutButton">Checkout</button>
		</section>

		<section class="hero-card stats-area">
			<div class="stats-grid">
				<div class="stat-card available">
					<div class="stat-number" id="availableCount">32</div>
					<div class="stat-label">Available</div>
				</div>
				<div class="stat-card checkedout">
					<div class="stat-number" id="checkedOutCount">0</div>
					<div class="stat-label">Checked Out</div>
				</div>
			</div>
		</section>

		<section class="grid-panel">
			<h2>Devices</h2>
			<div id="deviceGrid" class="device-grid" aria-label="Device grid"></div>
		</section>

		<section class="log-panel">
			<h2>Activity Log</h2>
			<ul id="activityLog" class="activity-log">
				<li class="log-empty">No actions yet. Use checkout or checkin to start logging.</li>
			</ul>
		</section>
	</div>

	<div class="modal" id="checkoutModal" aria-hidden="true">
		<div class="modal-content">
			<button class="modal-close" id="closeCheckout">×</button>
			<h3>Checkout Chromebook</h3>
			<form id="checkoutForm">
				<label for="checkoutDevice">Chromebook Number</label>
				<input type="text" id="checkoutDevice" name="device" required placeholder="xxx" />
				<label for="checkoutStudent">Student ID</label>
				<input type="text" id="checkoutStudent" name="student" required placeholder="xxx" />
				<button type="submit" class="primary-btn">Confirm Checkout</button>
			</form>
		</div>
	</div>

	<div class="modal" id="checkinModal" aria-hidden="true">
		<div class="modal-content">
			<button class="modal-close" id="closeCheckin">×</button>
			<h3>Checkin Chromebook</h3>
			<form id="checkinForm">
				<label for="checkinStudent">Student ID</label>
				<input type="text" id="checkinStudent" name="student" required placeholder="e.g. S12345" />
				<button type="submit" class="primary-btn">Confirm Checkin</button>
			</form>
		</div>
	</div>

	<div class="modal" id="deviceModal" aria-hidden="true">
		<div class="modal-content">
			<button class="modal-close" id="closeDevice">×</button>
			<h3 id="deviceModalTitle">Device</h3>
			<div id="deviceModalBody"></div>
		</div>
	</div>

	<script>
		const checkoutButton = document.getElementById('checkoutButton');
		const checkinButton = document.getElementById('checkinButton');
		const checkoutModal = document.getElementById('checkoutModal');
		const checkinModal = document.getElementById('checkinModal');
		const closeCheckout = document.getElementById('closeCheckout');
		const closeCheckin = document.getElementById('closeCheckin');
		const checkoutForm = document.getElementById('checkoutForm');
		const checkinForm = document.getElementById('checkinForm');
		const activityLog = document.getElementById('activityLog');
		const TOTAL_DEVICES = 32;
		const STORAGE_KEY = 'cbcheckouts_v1';
		const state = {
			devices: {},
			activity: []
		};

		function ensureDevices() {
			for (let i = 1; i <= TOTAL_DEVICES; i++) {
				const key = String(i);
				const pad = String(i).padStart(2, '0');
				if (!Object.prototype.hasOwnProperty.call(state.devices, key) || state.devices[key] === null) {
					state.devices[key] = { serial: `SN${pad}`, barcode: `BC${pad}`, student: null };
				} else {
					// normalize legacy string value into object
					const cur = state.devices[key];
					if (typeof cur === 'string') {
						// assume string was student id
						state.devices[key] = { serial: `SN${pad}`, barcode: `BC${pad}`, student: cur };
					}
				}
			}
		}

		function saveState() {
			try {
				const payload = { devices: state.devices, activity: state.activity };
				localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
			} catch (e) {
				console.warn('Failed to save state', e);
			}
		}

		function loadState() {
			try {
				const raw = localStorage.getItem(STORAGE_KEY);
				if (raw) {
					const parsed = JSON.parse(raw);
					if (parsed && typeof parsed === 'object') {
						if (parsed.devices && typeof parsed.devices === 'object') {
							// devices may be an object mapping deviceNum -> { serial, barcode, student }
							state.devices = parsed.devices;
						} else if (parsed.checkouts && typeof parsed.checkouts === 'object') {
							// legacy format: map student->deviceString, attempt to convert
							for (const [student, deviceStr] of Object.entries(parsed.checkouts)) {
								const numMatch = String(deviceStr).match(/(\d+)/);
								if (numMatch) {
									const deviceNum = String(parseInt(numMatch[1], 10));
									state.devices[deviceNum] = { serial: `SN${deviceNum.padStart(2,'0')}`, barcode: `BC${deviceNum.padStart(2,'0')}`, student };
								}
							}
						}
						if (Array.isArray(parsed.activity)) {
							state.activity = parsed.activity;
						}
					}
				}
			} catch (e) {
				console.warn('Failed to load state', e);
			}
			ensureDevices();
		}

		function updateCounts() {
			const checked = Object.values(state.devices).filter(Boolean).length;
			const available = Math.max(0, TOTAL_DEVICES - checked);
			document.getElementById('checkedOutCount').textContent = checked;
			document.getElementById('availableCount').textContent = available;
		}

		const deviceGrid = document.getElementById('deviceGrid');
		const deviceModal = document.getElementById('deviceModal');
		const closeDevice = document.getElementById('closeDevice');
		const deviceModalTitle = document.getElementById('deviceModalTitle');
		const deviceModalBody = document.getElementById('deviceModalBody');

		function renderGrid() {
			deviceGrid.innerHTML = '';
			for (let i = 1; i <= TOTAL_DEVICES; i++) {
				const key = String(i);
				const device = state.devices[key];
				const btn = document.createElement('button');
				btn.className = 'device-btn ' + (device && device.student ? 'checkedout' : 'available');
				btn.textContent = key;
				btn.title = device ? `${device.serial} / ${device.barcode}` : '';
				btn.dataset.device = key;
				btn.addEventListener('click', () => openDeviceModal(key));
				deviceGrid.appendChild(btn);
			}
		}

		function openDeviceModal(deviceNum) {
			deviceModalTitle.textContent = `Device ${deviceNum}`;
			const device = state.devices[String(deviceNum)];
			deviceModalBody.innerHTML = '';
			const meta = document.createElement('p');
			meta.textContent = `Serial: ${device.serial} — Barcode: ${device.barcode}`;
			deviceModalBody.appendChild(meta);
			if (device.student) {
				const p = document.createElement('p');
				p.textContent = `Checked out to: ${device.student}`;
				const btn = document.createElement('button');
				btn.className = 'primary-btn';
				btn.textContent = 'Checkin';
				btn.addEventListener('click', () => {
					const student = device.student;
					device.student = null;
					addLog(`Checked in Chromebook ${deviceNum} from student ${student}`);
					saveState();
					updateCounts();
					renderGrid();
					renderActivity();
					closeModal(deviceModal);
				});
				deviceModalBody.appendChild(p);
				deviceModalBody.appendChild(btn);
			} else {
				const form = document.createElement('form');
				form.innerHTML = `
					<label for="deviceStudent">Student ID</label>
					<input id="deviceStudent" name="student" required placeholder="e.g. S12345" />
				`;
				const submit = document.createElement('button');
				submit.className = 'primary-btn';
				submit.textContent = 'Checkout by Serial';
				submit.type = 'button';
				submit.addEventListener('click', () => {
					const input = form.querySelector('#deviceStudent');
					const studentId = input.value.trim();
					if (!studentId) return;
					// perform checkout using serial matching
					const serialToMatch = device.serial;
					let foundDevice = null;
					for (const [num, d] of Object.entries(state.devices)) {
						if (d && d.serial === serialToMatch) {
							foundDevice = num;
							break;
						}
					}
					if (foundDevice) {
						state.devices[foundDevice].student = studentId;
						addLog(`Checked out Chromebook ${foundDevice} (serial ${serialToMatch}) to student ${studentId}`);
						saveState();
						updateCounts();
						renderGrid();
						renderActivity();
						closeModal(deviceModal);
					}
				});
				deviceModalBody.appendChild(form);
				deviceModalBody.appendChild(submit);
			}
			openModal(deviceModal);
		}

		function openModal(modal) {
			modal.classList.add('open');
			modal.setAttribute('aria-hidden', 'false');
		}

		function closeModal(modal) {
			modal.classList.remove('open');
			modal.setAttribute('aria-hidden', 'true');
		}

		function addLog(message) {
			const text = `${new Date().toLocaleTimeString()} — ${message}`;
			// store newest first
			state.activity.unshift(text);
			saveState();
			const emptyNode = document.querySelector('.log-empty');
			if (emptyNode) emptyNode.remove();
			const item = document.createElement('li');
			item.textContent = text;
			activityLog.prepend(item);
		}

		function renderActivity() {
			activityLog.innerHTML = '';
			if (!state.activity || state.activity.length === 0) {
				const empty = document.createElement('li');
				empty.className = 'log-empty';
				empty.textContent = 'No actions yet. Use checkout or checkin to start logging.';
				activityLog.appendChild(empty);
				return;
			}
			for (const entry of state.activity) {
				const item = document.createElement('li');
				item.textContent = entry;
				activityLog.appendChild(item);
			}
		}

		checkoutButton.addEventListener('click', () => openModal(checkoutModal));
		checkinButton.addEventListener('click', () => openModal(checkinModal));
		closeCheckout.addEventListener('click', () => closeModal(checkoutModal));
		closeCheckin.addEventListener('click', () => closeModal(checkinModal));
		closeDevice.addEventListener('click', () => closeModal(deviceModal));

		checkoutForm.addEventListener('submit', event => {
			event.preventDefault();
			const serialRaw = document.getElementById('checkoutDevice').value.trim();
			const student = document.getElementById('checkoutStudent').value.trim();
			if (!serialRaw || !student) return;
			// find device by serial (accept plain number or full serial like 'SN01')
			let found = null;
			// normalize serial search
			const norm = serialRaw.toUpperCase();
			for (const [num, d] of Object.entries(state.devices)) {
				if (!d) continue;
				if (d.serial === norm || d.serial === serialRaw || d.barcode === norm || d.barcode === serialRaw || num === serialRaw || num === String(parseInt(serialRaw, 10))) {
					found = num;
					break;
				}
				// also loose match digits inside input
				const digits = String(serialRaw).match(/(\d+)/);
				if (digits && String(parseInt(digits[1], 10)) === num) {
					found = num;
					break;
				}
			}
			if (!found) return;
			state.devices[found].student = student;
			addLog(`Checked out Chromebook ${found} (serial ${state.devices[found].serial}) to student ${student}`);
			saveState();
			checkoutForm.reset();
			closeModal(checkoutModal);
			updateCounts();
			renderGrid();
			renderActivity();
		});

		checkinForm.addEventListener('submit', event => {
			event.preventDefault();
			const student = document.getElementById('checkinStudent').value.trim();
			if (!student) return;
			let found = null;
			for (const [num, sid] of Object.entries(state.devices)) {
				if (sid === student) {
					found = num;
					break;
				}
			}
			if (found) {
				state.devices[found] = null;
				addLog(`Checked in Chromebook ${found} from student ${student}`);
			} else {
				addLog(`No Chromebook found for student ${student}`);
			}
			saveState();
			checkinForm.reset();
			closeModal(checkinModal);
			updateCounts();
			renderGrid();
			renderActivity();
		});

		// load persisted state and initialize counts on load
		loadState();
		renderGrid();
		updateCounts();
		renderActivity();
	</script>
</body>
</html>
